name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.3.0 or v0.3.0)"
        required: true
        type: string
      publish:
        description: "Release visibility"
        required: true
        default: published
        type: choice
        options:
          - published
          - draft
      notes:
        description: "Optional release notes prefix"
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: production
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4

      - name: Validate signing secrets and prepare keystore
        run: |
          set -euo pipefail
          required_vars=(ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD)
          for var_name in "${required_vars[@]}"; do
            if [[ -z "${!var_name:-}" ]]; then
              echo "Missing required secret: ${var_name}"
              exit 1
            fi
          done

          echo "${ANDROID_KEYSTORE_BASE64}" | base64 --decode > "$RUNNER_TEMP/androbot-upload-keystore.jks"
          echo "ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/androbot-upload-keystore.jks" >> "$GITHUB_ENV"

      - name: Normalize release metadata
        id: meta
        run: |
          set -euo pipefail
          VERSION="${{ inputs.version }}"
          if [[ "$VERSION" =~ ^v ]]; then
            TAG="$VERSION"
            PLAIN="${VERSION#v}"
          else
            TAG="v$VERSION"
            PLAIN="$VERSION"
          fi

          DEBUG_ASSET="androbot-debug-${TAG}.apk"
          RELEASE_ASSET="androbot-release-${TAG}.apk"
          RELEASE_LATEST_ASSET="androbot-release-latest.apk"
          BUNDLE_ASSET="androbot-release-${TAG}.aab"
          RELEASE_SHA_ASSET="androbot-release-${TAG}.apk.sha256"
          UPDATE_ASSET="androbot-update.json"

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$PLAIN" >> "$GITHUB_OUTPUT"
          echo "debug_asset=$DEBUG_ASSET" >> "$GITHUB_OUTPUT"
          echo "release_asset=$RELEASE_ASSET" >> "$GITHUB_OUTPUT"
          echo "release_latest_asset=$RELEASE_LATEST_ASSET" >> "$GITHUB_OUTPUT"
          echo "bundle_asset=$BUNDLE_ASSET" >> "$GITHUB_OUTPUT"
          echo "release_sha_asset=$RELEASE_SHA_ASSET" >> "$GITHUB_OUTPUT"
          echo "update_asset=$UPDATE_ASSET" >> "$GITHUB_OUTPUT"

      - name: Build debug/release APKs and release AAB
        run: |
          ./gradlew --no-daemon assembleDebug assembleRelease bundleRelease

      - name: Prepare release assets and changelog
        env:
          REPO: ${{ github.repository }}
          TAG: ${{ steps.meta.outputs.tag }}
          DEBUG_ASSET: ${{ steps.meta.outputs.debug_asset }}
          RELEASE_ASSET: ${{ steps.meta.outputs.release_asset }}
          RELEASE_LATEST_ASSET: ${{ steps.meta.outputs.release_latest_asset }}
          BUNDLE_ASSET: ${{ steps.meta.outputs.bundle_asset }}
          RELEASE_SHA_ASSET: ${{ steps.meta.outputs.release_sha_asset }}
          UPDATE_ASSET: ${{ steps.meta.outputs.update_asset }}
          INPUT_NOTES: ${{ inputs.notes }}
        run: |
          set -euo pipefail
          SIGNED_APK_PATH="app/build/outputs/apk/release/app-release.apk"
          if [[ ! -f "$SIGNED_APK_PATH" ]]; then
            echo "Signed APK not found at $SIGNED_APK_PATH"
            echo "Release APK output directory contents:"
            ls -la app/build/outputs/apk/release || true
            exit 1
          fi

          cp app/build/outputs/apk/debug/app-debug.apk "$DEBUG_ASSET"
          cp "$SIGNED_APK_PATH" "$RELEASE_ASSET"
          cp "$SIGNED_APK_PATH" "$RELEASE_LATEST_ASSET"
          cp app/build/outputs/bundle/release/app-release.aab "$BUNDLE_ASSET"
          RELEASE_SHA256="$(sha256sum "$RELEASE_ASSET" | awk '{print $1}')"
          echo "$RELEASE_SHA256  $RELEASE_ASSET" > "$RELEASE_SHA_ASSET"

          PREV_TAG="$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || true)"
          if [[ -n "$PREV_TAG" ]]; then
            CHANGELOG="$(git log --pretty=format:'- %h %s' "${PREV_TAG}..HEAD")"
          else
            CHANGELOG="$(git log --pretty=format:'- %h %s')"
          fi

          DEBUG_URL="https://github.com/${REPO}/releases/download/${TAG}/${DEBUG_ASSET}"
          RELEASE_URL="https://github.com/${REPO}/releases/download/${TAG}/${RELEASE_ASSET}"
          RELEASE_LATEST_URL="https://github.com/${REPO}/releases/latest/download/${RELEASE_LATEST_ASSET}"
          BUNDLE_URL="https://github.com/${REPO}/releases/download/${TAG}/${BUNDLE_ASSET}"
          UPDATE_URL="https://github.com/${REPO}/releases/latest/download/${UPDATE_ASSET}"
          VERSION_CODE="$(
            sed -nE \
              -e 's/^[[:space:]]*versionCode[[:space:]]*=[[:space:]]*([0-9]+).*/\1/p' \
              -e 's/^[[:space:]]*versionCode[[:space:]]*=[[:space:]]*versionCodeOverride[[:space:]]*\?:[[:space:]]*([0-9]+).*/\1/p' \
              app/build.gradle.kts | head -n1
          )"

          if [[ -z "$VERSION_CODE" ]]; then
            echo "Failed to parse versionCode from app/build.gradle.kts"
            exit 1
          fi

          cat > "$UPDATE_ASSET" <<JSON
          {
            "versionCode": ${VERSION_CODE},
            "versionName": "${{ steps.meta.outputs.version }}",
            "apkUrl": "${RELEASE_URL}",
            "sha256": "${RELEASE_SHA256}",
            "minSupportedVersionCode": 1
          }
          JSON

          {
            echo "# Androbot ${TAG}"
            echo
            if [[ -n "$INPUT_NOTES" ]]; then
              echo "$INPUT_NOTES"
              echo
            fi
            echo "## Download"
            echo
            echo "- Debug APK: ${DEBUG_URL}"
            echo "- Release APK (signed): ${RELEASE_URL}"
            echo "- Release APK (latest alias): ${RELEASE_LATEST_URL}"
            echo "- OTA metadata: ${UPDATE_URL}"
            echo "- Release AAB (Play upload): ${BUNDLE_URL}"
            echo
            echo "## Changelog"
            echo
            if [[ -n "$CHANGELOG" ]]; then
              echo "$CHANGELOG"
            else
              echo "- No commit changes detected."
            fi
          } > release-body.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: Androbot ${{ steps.meta.outputs.tag }}
          body_path: release-body.md
          draft: ${{ inputs.publish == 'draft' }}
          files: |
            ${{ steps.meta.outputs.debug_asset }}
            ${{ steps.meta.outputs.release_asset }}
            ${{ steps.meta.outputs.release_latest_asset }}
            ${{ steps.meta.outputs.release_sha_asset }}
            ${{ steps.meta.outputs.update_asset }}
            ${{ steps.meta.outputs.bundle_asset }}
